<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8" />
<title>Vivid Caseload</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 520px; }
th { cursor:pointer; }
</style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 dark:text-white">

<!-- LOGIN -->
<div id="login" class="h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded shadow w-96">
    <h1 class="text-xl font-bold mb-4">Caseload Login</h1>
    <input id="password" type="password" class="w-full border p-2 mb-4"/>
    <button onclick="checkPassword()" class="w-full bg-blue-600 text-white p-2 rounded">Enter</button>
  </div>
</div>

<div id="app" class="hidden">

<div class="p-4 flex justify-between items-center">
  <h1 class="text-2xl font-bold">Client Caseload</h1>
  <div>
    <button onclick="toggleDark()">🌓</button>
    <button onclick="showMap()" class="bg-green-600 text-white px-3 py-1 rounded ml-3">Map</button>
    <button onclick="openForm()" class="bg-blue-600 text-white px-3 py-1 rounded ml-3">Add Client</button>
  </div>
</div>

<!-- FILTERS -->
<div class="p-4 grid grid-cols-4 gap-4">
  <select id="filterStaff" onchange="renderClients()" class="border p-2 text-black"></select>
  <select id="filterDay" onchange="renderClients()" class="border p-2 text-black">
    <option value="">All Days</option>
    <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
    <option>Thursday</option><option>Friday</option>
  </select>
  <select id="filterLGA" onchange="renderClients()" class="border p-2 text-black"></select>
  <input id="search" oninput="renderClients()" placeholder="Search..." class="border p-2 text-black"/>
</div>

<!-- TABLE -->
<div class="p-4 overflow-auto">
<table class="w-full text-sm">
<thead>
<tr class="border-b">
  <th><input type="checkbox" id="selectAll" onchange="toggleAll()"/></th>
  <th onclick="sortBy('name')">Name</th>
  <th onclick="sortBy('staff')">Staff</th>
  <th onclick="sortBy('suburb')">Suburb</th>
  <th onclick="sortBy('lga')">LGA</th>
  <th onclick="sortBy('day')">Day</th>
  <th>Notes (live edit)</th>
  <th></th>
</tr>
</thead>
<tbody id="clientTable"></tbody>
</table>
</div>
</div>

<!-- FORM -->
<div id="formModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
  <div class="bg-white text-black p-6 w-[500px] rounded">
    <h2 class="font-bold mb-3">Client</h2>
    <input id="name" placeholder="Client Name" class="w-full border p-2 mb-2"/>
    <select id="staff" class="w-full border p-2 mb-2"></select>
    <input id="suburb" placeholder="Suburb" class="w-full border p-2 mb-2"/>
    <input id="lga" placeholder="LGA" class="w-full border p-2 mb-2"/>
    <input id="day" placeholder="Day" class="w-full border p-2 mb-2"/>
    <textarea id="notes" placeholder="Notes" class="w-full border p-2 mb-2"></textarea>
    <div class="flex justify-end">
      <button onclick="saveClient()" class="bg-blue-600 text-white px-4 py-2 rounded mr-2">Save</button>
      <button onclick="closeForm()">Cancel</button>
    </div>
  </div>
</div>

<!-- MAP -->
<div id="mapModal" class="hidden fixed inset-0 bg-black bg-opacity-70 p-8">
  <div class="bg-white h-full p-4">
    <button onclick="closeMap()">Close</button>
    <div id="map"></div>
  </div>
</div>

<script>
const STAFF = ["Megan","Lara M","Liv","Liz"];
let clients = JSON.parse(localStorage.getItem("clients")||"[]");
let sortKey="name", sortAsc=true, editIndex=null, map;

function checkPassword(){
 if(password.value==="vividearlylearning"){
  login.classList.add("hidden");
  app.classList.remove("hidden");
  initFilters();
  renderClients();
 }
}

function toggleDark(){ document.documentElement.classList.toggle("dark"); }

function initFilters(){
  filterStaff.innerHTML='<option value="">All Staff</option>'+STAFF.map(s=>`<option>${s}</option>`);
  staff.innerHTML=STAFF.map(s=>`<option>${s}</option>`);
  updateLGAFilter();
}

function updateLGAFilter(){
  const lgas=[...new Set(clients.map(c=>c.lga))];
  filterLGA.innerHTML='<option value="">All LGA</option>'+lgas.map(l=>`<option>${l}</option>`);
}

function openForm(i=null){
 editIndex=i;
 formModal.classList.remove("hidden");
 if(i!==null){
  const c=clients[i];
  name.value=c.name; staff.value=c.staff;
  suburb.value=c.suburb; lga.value=c.lga;
  day.value=c.day; notes.value=c.notes;
 }
}

function closeForm(){ formModal.classList.add("hidden"); }

function saveClient(){
 const c={name:name.value,staff:staff.value,suburb:suburb.value,lga:lga.value,day:day.value,notes:notes.value};
 if(editIndex!==null) clients[editIndex]=c; else clients.push(c);
 localStorage.setItem("clients",JSON.stringify(clients));
 closeForm(); updateLGAFilter(); renderClients();
}

function sortBy(k){ sortAsc = (k===sortKey)?!sortAsc:true; sortKey=k; renderClients(); }

function renderClients(){
 const s=search.value.toLowerCase();
 const fs=filterStaff.value, fd=filterDay.value, fl=filterLGA.value;
 const tbody=clientTable; tbody.innerHTML="";

 let filtered=clients.filter(c=>
  (!fs||c.staff===fs)&&(!fd||c.day===fd)&&(!fl||c.lga===fl)&&
  JSON.stringify(c).toLowerCase().includes(s)
 );

 filtered.sort((a,b)=> a[sortKey]>b[sortKey] ? (sortAsc?1:-1) : (sortAsc?-1:1));

 filtered.forEach((c,i)=>{
  tbody.innerHTML+=`
  <tr class="border-b">
    <td><input type="checkbox" class="mapCheck" data-i="${i}" checked/></td>
    <td>${c.name}</td>
    <td>${c.staff}</td>
    <td>${c.suburb}</td>
    <td>${c.lga}</td>
    <td>${c.day}</td>
    <td><textarea onchange="updateNotes(${i},this.value)" class="w-full border">${c.notes}</textarea></td>
    <td><button onclick="openForm(${i})">Edit</button></td>
  </tr>`;
 });
}

function updateNotes(i,val){ clients[i].notes=val; localStorage.setItem("clients",JSON.stringify(clients)); }

function toggleAll(){
 document.querySelectorAll(".mapCheck").forEach(c=>c.checked=selectAll.checked);
}

/* MAP */
function showMap(){
 mapModal.classList.remove("hidden");
 setTimeout(initMap,200);
}

function closeMap(){ mapModal.classList.add("hidden"); }

function initMap(){
 if(!map){
  map=L.map('map').setView([-32.9,151.75],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
 }
 map.eachLayer(l=>{ if(l instanceof L.Marker) map.removeLayer(l); });

 document.querySelectorAll(".mapCheck:checked").forEach(cb=>{
  const c=clients[cb.dataset.i];
  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${c.suburb}`)
   .then(r=>r.json())
   .then(d=>{
     if(d[0]){
       L.marker([d[0].lat,d[0].lon])
        .addTo(map)
        .bindPopup(`<b>${c.name}</b><br>${c.staff}<br>${c.suburb}`);
     }
   });
 });
}
</script>
</body>
</html>
