<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Vivid Caseload</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{font-family:'Inter',sans-serif}
#map{height:360px}
.rowHover:hover{transform:scale(1.01);background:#f4f6ef}
.modal{z-index:60}
.dim{filter:brightness(0.55)}
</style>

<script>
tailwind.config={theme:{extend:{colors:{brand:{500:'#708b42',600:'#5c7336',100:'#e6ead8'}}}}}
</script>
</head>

<body class="bg-gray-50">

<!-- LOGIN -->
<div id="login" class="h-screen flex items-center justify-center">
 <div class="bg-white p-10 rounded-xl shadow w-96 text-center">
  <img src="https://vividearlylearning.com.au/wp-content/uploads/2025/07/Vivid-Early-Learning_RGB_Primary-logo_fullcolor-300x142.png" class="h-14 mx-auto mb-4"/>
  <h1 class="text-xl font-semibold mb-4">Caseload Login</h1>
  <input id="password" type="password" class="w-full border p-3 rounded mb-2" onkeydown="if(event.key==='Enter')checkPassword()"/>
  <p id="loginError" class="text-red-600 text-sm hidden">Incorrect password</p>
  <button onclick="checkPassword()" class="w-full bg-brand-600 text-white p-3 rounded mt-3">Enter</button>
 </div>
</div>

<div id="app" class="hidden">

<!-- HEADER -->
<header class="bg-white shadow px-6 py-4 flex justify-between items-center">
 <div class="flex items-center gap-6">
  <img src="https://vividearlylearning.com.au/wp-content/uploads/2025/07/Vivid-Early-Learning_RGB_Primary-logo_fullcolor-300x142.png" class="h-10"/>
  <select id="headerTherapist" class="border p-2 rounded text-sm"></select>
 </div>
 <div class="flex gap-3">
  <button onclick="openStaffModal()" class="border px-4 py-2 rounded">Edit Staff</button>
  <button onclick="openClientModal()" class="bg-brand-600 text-white px-4 py-2 rounded">Add Client</button>
 </div>
</header>

<div id="mapWrap" class="p-6">
 <div id="map" class="rounded-xl shadow"></div>
</div>

<div class="p-6">
<table class="w-full bg-white rounded-xl shadow text-sm">
<thead class="bg-brand-100 text-left">
<tr>
<th class="p-3">Name</th>
<th>Address</th>
<th>LGA</th>
<th>Lead Therapist</th>
<th></th>
</tr>
</thead>
<tbody id="clientTable"></tbody>
</table>
</div>

</div>

<!-- GENERIC MODAL -->
<div id="overlay" class="hidden modal fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center"></div>

<script>
let STAFF=JSON.parse(localStorage.getItem("staff")||'["Megan","Lara M","Liv"]');
let clients=JSON.parse(localStorage.getItem("clients")||"[]");
let map, markers=[], editIndex=null, tempLat=null, tempLng=null;

/* LOGIN */
function checkPassword(){
 if(password.value==="vividearlylearning"){
  login.style.display="none"; app.style.display="block";
  init();
 } else loginError.classList.remove("hidden");
}

/* INIT */
function init(){
 map=L.map('map').setView([-32.9,151.75],10);
 L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
 headerTherapist.innerHTML='<option value="">All Therapists</option>'+STAFF.map(s=>`<option>${s}</option>`);
 headerTherapist.onchange=renderAll;
 renderAll();
}

/* RENDER */
function renderAll(){ renderTable(); renderMap(); }

function renderTable(){
 clientTable.innerHTML="";
 clients.filter(c=>!headerTherapist.value||c.lead===headerTherapist.value)
 .forEach((c,i)=>{
 clientTable.innerHTML+=`
 <tr class="border-t rowHover cursor-pointer" onclick="openDetails(${i})">
  <td class="p-3">${c.name}</td>
  <td>${c.address}</td>
  <td>${c.lga}</td>
  <td>${c.lead}</td>
  <td class="space-x-2" onclick="event.stopPropagation()">
   <button onclick="openComments(${i})">💬</button>
   <button onclick="openEdit(${i})">✏️</button>
   <button onclick="deleteClient(${i})">🗑️</button>
  </td>
 </tr>`;
 });
}

function renderMap(){
 markers.forEach(m=>map.removeLayer(m)); markers=[];
 clients.forEach(c=>{
  if(c.lat){
   markers.push(L.marker([c.lat,c.lng]).addTo(map).bindPopup(c.name));
  }
 });
}

/* MODAL UTILS */
function showModal(html){
 overlay.innerHTML=`<div class="bg-white p-8 rounded-xl w-[620px] relative">
 <button class="absolute top-3 right-3 text-xl" onclick="closeModal()">×</button>
 ${html}
 </div>`;
 overlay.classList.remove("hidden");
 mapWrap.classList.add("dim");
}
function closeModal(){
 overlay.classList.add("hidden");
 mapWrap.classList.remove("dim");
 overlay.innerHTML="";
}

/* STAFF */
function openStaffModal(){
 showModal(`
 <h2 class="text-xl font-semibold mb-4">Staff</h2>
 <ul>${STAFF.map((s,i)=>`<li class="flex justify-between mb-2">${s}
 <button onclick="STAFF.splice(${i},1);saveStaff()">🗑️</button></li>`).join('')}</ul>
 <input id="newStaff" class="border p-2 w-full mt-3" placeholder="Add staff"/>
 <button onclick="STAFF.push(newStaff.value);saveStaff()" class="mt-2 bg-brand-600 text-white px-3 py-2 rounded">Add</button>
 `);
}
function saveStaff(){
 localStorage.setItem("staff",JSON.stringify(STAFF));
 closeModal(); init();
}

/* CLIENT ADD/EDIT */
function openClientModal(){ editIndex=null; clientForm(); }
function openEdit(i){ editIndex=i; clientForm(clients[i]); }

function clientForm(c={}){
 showModal(`
 <h2 class="text-xl font-semibold mb-4">Client</h2>
 <input id="c_name" class="border p-2 w-full mb-2" placeholder="Name" value="${c.name||''}"/>
 <input id="c_address" oninput="lookup(this.value)" class="border p-2 w-full mb-1" placeholder="Address" value="${c.address||''}"/>
 <div id="addrList" class="text-sm mb-2"></div>
 <input id="c_lga" class="border p-2 w-full mb-2" placeholder="LGA" value="${c.lga||''}"/>
 <button onclick="saveClient()" class="bg-brand-600 text-white px-3 py-2 rounded">Save</button>
 `);
}

function lookup(q){
 fetch(`https://nominatim.openstreetmap.org/search?country=Australia&format=json&q=${q}`)
 .then(r=>r.json()).then(d=>{
  addrList.innerHTML=d.slice(0,5).map(a=>
   `<div class="p-2 hover:bg-brand-100 cursor-pointer"
   onclick="selectAddr('${a.display_name}',${a.lat},${a.lon}')">${a.display_name}</div>`).join('');
 });
}
function selectAddr(a,lat,lng){
 c_address.value=a; tempLat=lat; tempLng=lng; addrList.innerHTML="";
}

function saveClient(){
 const c={
  name:c_name.value,
  address:c_address.value,
  lga:c_lga.value,
  lead:headerTherapist.value||STAFF[0],
  lat:tempLat, lng:tempLng,
  comments:(editIndex!==null?clients[editIndex].comments:[])
 };
 if(editIndex!==null) clients[editIndex]=c; else clients.push(c);
 localStorage.setItem("clients",JSON.stringify(clients));
 closeModal(); renderAll();
}

/* COMMENTS */
function openComments(i){
 const c=clients[i];
 showModal(`
 <h2 class="text-xl font-semibold mb-4">Comments — ${c.name}</h2>
 <div>${c.comments.map((cm,ix)=>`
  <div class="flex justify-between border-b py-2">${cm}
   <button onclick="clients[${i}].comments.splice(${ix},1);saveAndRefresh()">🗑️</button>
  </div>`).join('')}</div>
 <input id="newComment" class="border p-2 w-full mt-3"/>
 <button onclick="clients[${i}].comments.push(newComment.value);saveAndRefresh()"
 class="mt-2 bg-brand-600 text-white px-3 py-2 rounded">Add</button>
 `);
}
function saveAndRefresh(){
 localStorage.setItem("clients",JSON.stringify(clients));
 closeModal(); renderAll();
}

/* DELETE */
function deleteClient(i){
 if(confirm("Are you sure?")){
  clients.splice(i,1);
  localStorage.setItem("clients",JSON.stringify(clients));
  renderAll();
 }
}
</script>
</body>
</html>
